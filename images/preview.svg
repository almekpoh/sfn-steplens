<svg xmlns="http://www.w3.org/2000/svg" width="920" height="580" viewBox="0 0 920 580">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#666"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#a07800"/>
    </marker>
    <marker id="ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#c0392b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="580" fill="#1e1e1e"/>

  <!-- ── Toolbar ── -->
  <rect width="920" height="46" fill="#252526"/>
  <!-- Active tab -->
  <rect x="0" y="0" width="108" height="46" fill="#1e1e1e"/>
  <rect x="0" y="43" width="108" height="3" fill="#4a9de8"/>
  <text x="14" y="27" font-family="'Segoe UI',sans-serif" font-size="12" fill="#d4d4d4">Main</text>
  <rect x="58" y="12" width="36" height="18" fill="#2a4a6a" rx="9"/>
  <text x="76" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8bbfe8" text-anchor="middle">6</text>
  <!-- Inactive tab -->
  <rect x="108" y="0" width="160" height="46" fill="#2d2d2d"/>
  <text x="122" y="27" font-family="'Segoe UI',sans-serif" font-size="12" fill="#777">ProcessFiles — Iterator</text>
  <!-- Buttons -->
  <rect x="686" y="11" width="56" height="24" fill="#3c3c3c" rx="4"/>
  <text x="714" y="27" font-family="'Segoe UI',sans-serif" font-size="11" fill="#ccc" text-anchor="middle">⊡ Fit</text>
  <rect x="750" y="11" width="60" height="24" fill="#3c3c3c" rx="4"/>
  <text x="780" y="27" font-family="'Segoe UI',sans-serif" font-size="11" fill="#ccc" text-anchor="middle">↓ PNG</text>
  <rect x="818" y="11" width="68" height="24" fill="#3c3c3c" rx="4"/>
  <text x="852" y="27" font-family="'Segoe UI',sans-serif" font-size="11" fill="#ccc" text-anchor="middle">↓ JPEG</text>
  <!-- Tab separator -->
  <line x1="0" y1="46" x2="920" y2="46" stroke="#333" stroke-width="1"/>

  <!-- ── Legend panel ── -->
  <rect x="636" y="46" width="284" height="534" fill="#1a1a1a"/>
  <line x1="636" y1="46" x2="636" y2="580" stroke="#2e2e2e" stroke-width="1"/>

  <text x="650" y="70" font-family="'Segoe UI',sans-serif" font-size="9" fill="#555" letter-spacing="1">STATES</text>

  <!-- Task -->
  <rect x="650" y="78" width="15" height="15" fill="#1e4080" stroke="#4a9de8" stroke-width="1.5" rx="1"/>
  <text x="672" y="90" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Task</text>
  <!-- Choice -->
  <polygon points="657,100 665,93 673,100 665,107" fill="#2e2d00" stroke="#ffe033" stroke-width="1.5"/>
  <text x="672" y="105" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Choice</text>
  <!-- Wait -->
  <rect x="650" y="113" width="15" height="15" fill="#0d3330" stroke="#4ec9b0" stroke-width="1.5" rx="1"/>
  <text x="672" y="125" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Wait</text>
  <!-- Pass -->
  <rect x="650" y="131" width="15" height="15" fill="#2a2a2a" stroke="#666" stroke-width="1.5" rx="1"/>
  <text x="672" y="143" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Pass</text>
  <!-- Succeed -->
  <circle cx="657" cy="162" r="7.5" fill="#0d3318" stroke="#4caf50" stroke-width="1.5"/>
  <text x="672" y="166" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Succeed</text>
  <!-- Fail -->
  <circle cx="657" cy="181" r="7.5" fill="#3a0d0d" stroke="#f44336" stroke-width="1.5"/>
  <text x="672" y="185" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Fail</text>
  <!-- Parallel/Map -->
  <rect x="650" y="192" width="15" height="15" fill="#2a1a3d" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
  <text x="672" y="204" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Parallel / Map</text>
  <!-- Retry -->
  <rect x="650" y="210" width="15" height="15" fill="#1a3d1a" stroke="#555" stroke-width="1.5" rx="1"/>
  <text x="672" y="222" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">↺ avec Retry</text>
  <!-- Parallel branches -->
  <rect x="650" y="228" width="15" height="15" fill="#2a1a3d" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
  <text x="672" y="240" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">‖N branches Parallel</text>
  <!-- Map concurrency -->
  <rect x="650" y="246" width="15" height="15" fill="#2a1a3d" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
  <text x="672" y="258" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">×N concurrence Map</text>
  <!-- Distributed Map -->
  <rect x="650" y="264" width="15" height="15" fill="#2a1a3d" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2" rx="1"/>
  <text x="672" y="276" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">⊕ Map distribué</text>
  <!-- waitForTaskToken -->
  <rect x="650" y="282" width="15" height="15" fill="#1e4080" stroke="#4a9de8" stroke-width="1.5" rx="1"/>
  <text x="672" y="294" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">⏸ waitForTaskToken</text>
  <!-- HTTP Task -->
  <rect x="650" y="300" width="15" height="15" fill="#1e4080" stroke="#4a9de8" stroke-width="1.5" rx="1"/>
  <text x="672" y="312" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">🌐 HTTP Task</text>
  <!-- Cursor highlight -->
  <rect x="650" y="318" width="15" height="15" fill="#2a1800" stroke="#f5a623" stroke-width="2" rx="1"/>
  <text x="672" y="330" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Current (cursor)</text>

  <line x1="650" y1="344" x2="908" y2="344" stroke="#2e2e2e" stroke-width="1"/>
  <text x="650" y="360" font-family="'Segoe UI',sans-serif" font-size="9" fill="#555" letter-spacing="1">TRANSITIONS</text>

  <line x1="650" y1="374" x2="675" y2="374" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <text x="682" y="378" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Next</text>
  <line x1="650" y1="393" x2="675" y2="393" stroke="#a07800" stroke-width="2" marker-end="url(#ab)"/>
  <text x="682" y="397" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Choice branch</text>
  <line x1="650" y1="412" x2="675" y2="412" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ac)"/>
  <text x="682" y="416" font-family="'Segoe UI',sans-serif" font-size="11" fill="#aaa">Catch (error)</text>

  <!-- ── Graph edges (drawn first, under nodes) ── -->

  <!-- START → ValidateOrder -->
  <line x1="310" y1="94" x2="310" y2="121" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ValidateOrder → RouteByType -->
  <line x1="310" y1="157" x2="310" y2="193" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- RouteByType → ProcessFiles (left) -->
  <path d="M275,218 C230,245 160,260 160,291" fill="none" stroke="#a07800" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="190" y="258" font-family="'Segoe UI',sans-serif" font-size="9" fill="#a07800">batch</text>

  <!-- RouteByType → EnrichUser (right) -->
  <path d="M345,218 C390,245 460,260 460,291" fill="none" stroke="#a07800" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="395" y="258" font-family="'Segoe UI',sans-serif" font-size="9" fill="#a07800">enrich</text>

  <!-- ProcessFiles catch edge (red dashed) to HandleError -->
  <path d="M80,325 C50,355 50,400 100,415" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ac)"/>
  <text x="28" y="375" font-family="'Segoe UI',sans-serif" font-size="9" fill="#c0392b">TaskFailed</text>

  <!-- ProcessFiles → NotifyUser -->
  <path d="M200,327 C220,360 270,378 285,399" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- EnrichUser → NotifyUser -->
  <path d="M420,327 C400,360 345,378 330,399" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- NotifyUser → END -->
  <line x1="310" y1="415" x2="310" y2="447" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Graph nodes ── -->

  <!-- START -->
  <circle cx="310" cy="80" r="14" fill="#2d2d2d" stroke="#666" stroke-width="1.5"/>
  <text x="310" y="84" font-family="'Segoe UI',sans-serif" font-size="9" fill="#999" text-anchor="middle">Start</text>

  <!-- ValidateOrder — Task, orange border = cursor position -->
  <rect x="210" y="122" width="200" height="34" fill="#2a1800" stroke="#f5a623" stroke-width="2" rx="4" filter="url(#shadow)"/>
  <text x="310" y="144" font-family="'Segoe UI',sans-serif" font-size="12" fill="#f0c070" text-anchor="middle">ValidateOrder</text>

  <!-- RouteByType — Choice (yellow diamond) -->
  <polygon points="310,193 375,218 310,243 245,218" fill="#2e2d00" stroke="#ffe033" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="222" font-family="'Segoe UI',sans-serif" font-size="11" fill="#d4d4d4" text-anchor="middle">RouteByType</text>

  <!-- HandleError — Fail (small, reached via catch) -->
  <circle cx="116" cy="420" r="22" fill="#3a0d0d" stroke="#f44336" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="116" y="418" font-family="'Segoe UI',sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Handle</text>
  <text x="116" y="430" font-family="'Segoe UI',sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Error</text>

  <!-- ProcessFiles — Map ×5 ↺ (purple dashed) -->
  <rect x="60" y="292" width="200" height="34" fill="#2a1a3d" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" rx="4" filter="url(#shadow)"/>
  <text x="160" y="314" font-family="'Segoe UI',sans-serif" font-size="12" fill="#d4d4d4" text-anchor="middle">ProcessFiles ×5 ↺</text>

  <!-- EnrichUser — Parallel ‖2 (purple dashed) -->
  <rect x="360" y="292" width="200" height="34" fill="#2a1a3d" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" rx="4" filter="url(#shadow)"/>
  <text x="460" y="314" font-family="'Segoe UI',sans-serif" font-size="12" fill="#d4d4d4" text-anchor="middle">EnrichUser ‖2</text>

  <!-- NotifyUser — Task (blue) -->
  <rect x="215" y="400" width="190" height="34" fill="#1e4080" stroke="#4a9de8" stroke-width="1.5" rx="4" filter="url(#shadow)"/>
  <text x="310" y="422" font-family="'Segoe UI',sans-serif" font-size="12" fill="#d4d4d4" text-anchor="middle">NotifyUser ⏸</text>

  <!-- END -->
  <circle cx="310" cy="462" r="14" fill="#2d2d2d" stroke="#666" stroke-width="1.5"/>
  <circle cx="310" cy="462" r="9" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="310" y="466" font-family="'Segoe UI',sans-serif" font-size="9" fill="#999" text-anchor="middle">End</text>

  <!-- Hint bar -->
  <rect x="0" y="558" width="636" height="22" fill="#1a1a1a"/>
  <text x="10" y="573" font-family="'Segoe UI',sans-serif" font-size="10" fill="#444">Scroll to zoom · Drag to pan · Click node to jump · Double-click Parallel/Map to explore sub-graph</text>
</svg>
