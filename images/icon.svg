<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c30"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glass" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#222238"/>
      <stop offset="100%" stop-color="#0d0d20"/>
    </radialGradient>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <polygon points="0,0 4,2.5 0,5" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Handle shadow then handle -->
  <line x1="80" y1="78" x2="111" y2="109" stroke="#7a4a00" stroke-width="8" stroke-linecap="round"/>
  <line x1="80" y1="78" x2="111" y2="109" stroke="#f5a623" stroke-width="6" stroke-linecap="round"/>

  <!-- Lens glass fill -->
  <circle cx="52" cy="52" r="36" fill="url(#glass)"/>

  <!-- Lens outer ring -->
  <circle cx="52" cy="52" r="36" fill="none" stroke="#f5a623" stroke-width="4"/>
  <!-- Lens inner depth ring -->
  <circle cx="52" cy="52" r="33" fill="none" stroke="#7a4a00" stroke-width="1" opacity="0.6"/>

  <!-- Glass shine — top-left arc -->
  <path d="M 27,40 A 30,30 0 0,1 46,20" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.18"/>

  <!-- ── State machine inside lens ───────────────────────────────────── -->

  <!-- START node (green circle) -->
  <circle cx="52" cy="24" r="6" fill="#0d2a18" stroke="#4caf50" stroke-width="2"/>
  <!-- START inner dot -->
  <circle cx="52" cy="24" r="2" fill="#4caf50"/>

  <!-- Arrow: Start → Task -->
  <line x1="52" y1="30" x2="52" y2="39" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TASK node (blue rectangle) -->
  <rect x="33" y="40" width="38" height="14" rx="3" fill="#1a3d6e" stroke="#4a9de8" stroke-width="2"/>

  <!-- Arrow: Task → Choice -->
  <line x1="52" y1="54" x2="52" y2="62" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CHOICE node (yellow diamond) -->
  <polygon points="52,63 67,72 52,81 37,72" fill="#2e2d00" stroke="#ffe033" stroke-width="2"/>
</svg>
